
services:
    nginx:
        image: nginx:latest
        ports:
            - "${BACKEND_PORT:-80}:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - ./app:/app
    php:
        build:
            context: .
            dockerfile: PHP.Dockerfile
        env_file:
            - .env
        volumes:
            - ./app:/app
    mysql:
        image: mariadb:latest
        environment:
            MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-secret123}'
            MYSQL_USER: '${MYSQL_USER:-developer}'
            MYSQL_PASSWORD: '${MYSQL_PASSWORD:-secret123}'
            MYSQL_DATABASE: '${MYSQL_DATABASE:-developmentdb}'
        volumes:
            - mysqldata:/var/lib/mysql
        ports:
            - "${MYSQL_PORT:-3306}:3306"
    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            # Change the left side from 8080 to 8081
            - "${PHPMYADMIN_PORT:-8081}:80" 
        environment:
            - PMA_HOST=mysql
        depends_on:
            - mysql
        
    # 🟢 NEW: The Redis Message Broker
    redis:
        image: redis:alpine
        ports:
            - "${REDIS_PORT:-6379}:6379"

    # 🟢 NEW: The Node.js WebSocket Server
    websocket:
        build:
            context: ./websocket-server
            dockerfile: Dockerfile
        ports:
            - "${WS_PORT:-6001}:8080"
        depends_on:
            - redis
        environment:
            # This tells Node.js how to find the Redis container
            - REDIS_URL=redis://redis:6379

volumes:
    mysqldata: {}


